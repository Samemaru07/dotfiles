################
### モニター設定 ###
################

ecosystem:no_update_news = true
monitor=DP-1,1920x1080@60,0x0,1
monitor=DP-2,1920x1080@60,1920x0,1
monitor=,preferred,auto,1
workspace=1,default:true,persistent
workspace=2,monitor:DP-2,default:true


##########################
### 使用するアプリケーション ###
##########################

$terminal = wezterm
$fileManager = dolphin
$menu = wofi --show drun


#################
### 自動起動 ###
#################

exec-once = bash ~/.config/hypr/scripts/startup.sh


####################
### 環境変数 ###
####################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = XDG_SESSION_TYPE,wayland
env = GTK_THEME,Adwaita


#####################
### 外観・見た目 ###
#####################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 3
    col.active_border = rgba(23,147,209,0.5)
    col.inactive_border = rgba(0,0,0,0)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = false
        range = 40
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,        popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, popin 80%
    animation = layersOut,     1,     4,     easeOutQuint, popin 80%
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.79,  almostLinear
    animation = workspaces,    1,     2.50,  almostLinear, slide
    # animation = workspacesIn,  1,     1.21,  almostLinear, slide
    # animation = workspacesOut, 1,     3.00,  almostLinear, slide
    animation = zoomFactor,    1,     7,     quick
}


#####################
### レイアウト設定 ###
#####################

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    vfr = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### 入力設定 ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# 3本指スワイプでワークスペース切り替え
gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


#################
### キーバインド ###
#################

$mainMod = SUPER

# 基本操作
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, ~/.config/hypr/scripts/logout.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, layoutmsg, togglesplit

# フォーカス移動
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ワークスペース切り替え
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ウィンドウをワークスペースへ移動
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# スクラッチパッド
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# マウスホイールでワークスペース切り替え
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# rofi
# bind = $mainMod, TAB, exec, bash ~/.config/rofi/scripts/window-switcher.sh
bind = $mainMod, TAB, exec, quickshell ipc -c ~/.config/quickshell/qs-hyprview call expose toggle columnar
# タスクスイッチャー
bind = ALT, TAB, focuscurrentorlast

# 自動ロック
bind = $mainMod, L, exec, hyprlock

# マウスドラッグでウィンドウ移動・リサイズ
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# grim (スクショ)
bind = , Print, exec, sh -c 'FILE=~/Pictures/$(date +%Y-%m-%d_%H-%M-%S).png; grim -g "$(slurp)" "$FILE" && notify-send "Screenshot" "$FILE"'

# rofimoji (絵文字)
bind = $mainMod, Z, exec, rofimoji --selector wofi --action copy

# eww-keycastのトグル
bind = $mainMod, P, exec, bash ~/.config/eww/scripts/keycast-toggle.sh

# 音量・輝度キー
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# メディアコントロール (playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### ウィンドウルール ###
##############################
windowrule {
    name = zen-center
    match:class = ^zen$

    float = yes
    center = yes
    size = 1400 900
}

# 最大化リクエストを抑制
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# XWaylandのドラッグ問題を修正
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# hyprland-run ウィンドウの位置設定
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# cava ウィンドウの設定
windowrule {
    name = cava-rules
    match:title = .*cava.*

    float = yes
    border_size = 0
    size = 870 230
    move = 10 840
}

# Spotify ウィンドウの設定
windowrule {
    name = spotify-rules
    match:class = ^([Ss]potify)$

    float = yes
    workspace = 1 silent
    size = 870 775
    move = 10 monitor_h-1025
    suppress_event = fullscreen 
    border_size = 0
}

windowrule {
    name = spotify-float-persist
    match:class = ^([Ss]potify)$
    match:fullscreen = false

    float = yes
    size = 870 775
    move = 10 monitor_h-1025
}

# tty-clock ウィンドウの設定
windowrule {
    name = clock-rules
    match:title = ^clock$

    workspace = 1
    float = yes
    border_size = 0
    size = 530 180
    move = 900 monitor_h-1025
}

# asciiquarium ウィンドウの設定
windowrule {
    name = aquarium-rules
    match:title = ^aquarium$

    workspace = 1
    float = yes
    border_size = 0
    size = 1010 375
    move = 900 245
}

# 写真ウィジェット1の設定
windowrule {
    name = photo1-rules
    match:title = ^photo1$

    workspace = 1
    float = yes
    border_size = 0
    move = 1455 monitor_h-1025
}

# 写真ウィジェット2の設定
windowrule {
    name = photo2-rules
    match:title = ^photo2$

    workspace = 1
    float = yes
    border_size = 0
    size = 220 180
    move = 1690 monitor_h-1025
}

# btopの設定
windowrule {
    name = btop-rules
    match:title = ^btop$

    workspace = 1 
    float = yes 
    border_size = 0 
    size = 1010 440 
    move = 900 monitor_h-450
}

# processingの実行結果
windowrule {
    name = processing-rules
    match:class = ^processing-core-PApplet$

    monitor = DP-2
}

## submap
submap=locked
bind = CTRL_ALT_SHIFT, escape, submap, reset
submap=reset
