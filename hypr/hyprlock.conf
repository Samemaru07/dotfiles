background {
    monitor =
    path = /home/samemaru/dotfiles/assets/lock/ironblood.png
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%Y年%m月%d日 (%a)")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 20
    font_family = Noto Sans
    position = 0, 20
    halign = center
    valign = center
}
